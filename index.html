<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iceland — Andy & Alex · Jul 29 – Aug 6, 2026</title>

<!-- MapLibre GL (modern vector map, smooth zoom/rotate, keyless tiles) -->
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --navy:#0b2239; --navy2:#13314f; --glacier:#5b9bc4; --ice:#acd3e8;
    --amber:#e0913c; --amber-deep:#a85e15; --paper:#f4efe6; --paper2:#ece4d6;
    --ink:#0b2239; --muted:#5e6b78; --line:#d8cfc0;
    --shadow:0 8px 30px rgba(11,34,57,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Spline Sans',sans-serif;color:var(--ink);background:var(--paper);line-height:1.5}
  a{color:var(--navy2)}
  .display{font-family:'Fraunces',serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  @media(min-width:861px){ body{overflow:hidden} }

  /* ---------- APP SHELL (header + split main) ---------- */
  #app{display:flex;flex-direction:column;height:100vh}
  @media(max-width:860px){ #app{height:auto;min-height:100vh} }

  header.top{
    flex:none;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:11px 18px;background:var(--navy);color:#fff;z-index:20
  }
  header.top .brand{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:.3px;white-space:nowrap}
  header.top .subtitle{font-size:12.5px;color:#aebfd0}
  @media(max-width:860px){ header.top{position:sticky;top:0} header.top .subtitle{flex-basis:100%;font-size:12px} }

  #main{flex:1;display:grid;grid-template-columns:var(--panel-w,calc(50% - 4px)) 8px 1fr;min-height:0}
  @media(max-width:860px){ #main{display:flex;flex-direction:column} }

  /* draggable divider between panel and map */
  #divider{cursor:col-resize;background:var(--line);display:flex;align-items:center;justify-content:center;position:relative;touch-action:none}
  #divider::before{content:"";width:2px;height:36px;border-radius:2px;background:var(--muted);opacity:.45;transition:opacity .15s, background .15s, height .15s}
  #divider:hover,#divider.dragging{background:var(--glacier)}
  #divider:hover::before,#divider.dragging::before{opacity:1;background:#fff;height:50px}
  @media(max-width:860px){ #divider{display:none} }

  /* ---------- LEFT PANEL (trip info, tabbed) ---------- */
  #panel{display:flex;flex-direction:column;min-height:0;background:var(--paper);border-right:1px solid var(--line)}
  @media(max-width:860px){ #panel{order:2;border-right:none;border-top:1px solid var(--line)} }

  .tabbar{flex:none;display:flex;gap:2px;overflow-x:auto;padding:8px 8px 0;background:var(--paper2);border-bottom:1px solid var(--line);scrollbar-width:none}
  .tabbar::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;padding:9px 13px;font-size:13px;font-weight:600;color:var(--muted);border-radius:9px 9px 0 0;border-bottom:2.5px solid transparent}
  .tab:hover{color:var(--navy2);background:rgba(255,255,255,.5)}
  .tab.active{color:var(--navy);background:var(--paper);border-bottom-color:var(--amber)}

  #tabcontent{overflow-y:auto;flex:1;min-height:0}
  @media(max-width:860px){ #tabcontent{overflow:visible} }
  .tabpane{padding:16px 16px 28px}
  .tabpane[hidden]{display:none}
  .pane-head{margin-bottom:12px}
  .sec-label{font-size:11px;letter-spacing:2.2px;text-transform:uppercase;color:var(--amber-deep);font-weight:700}
  h3.sec{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin-top:3px}
  .pane-hint{font-size:12.5px;color:var(--muted);margin-bottom:12px}

  /* ---------- ITINERARY (day overview + day detail) ---------- */
  .day-head{padding-bottom:12px;margin-bottom:6px;border-bottom:1px solid var(--line)}
  .day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .navbtn{width:32px;height:32px;border-radius:9px;background:#fff;color:var(--navy2);font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(11,34,57,.12)}
  .navbtn:hover{background:var(--paper2)}
  .navbtn[disabled]{opacity:.35;cursor:default}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--amber-deep);font-weight:700}
  .day-title{font-family:'Fraunces',serif;font-size:23px;font-weight:600;margin:2px 0 4px;line-height:1.12}
  .day-meta{font-size:13px;color:var(--muted)}
  .sleep{display:inline-block;margin-top:9px;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--amber-deep);font-weight:700;border:1px solid var(--amber);border-radius:6px;padding:2px 9px}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11.5px;color:var(--muted);margin:10px 0 4px}
  .legend i{font-style:normal}
  .lg-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--muted);vertical-align:middle;margin-right:4px}
  .lg-sq{display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--amber);vertical-align:middle;margin-right:4px}

  .stop{display:flex;gap:11px;align-items:flex-start;padding:10px;border-radius:10px;cursor:pointer;transition:background .12s}
  .stop:hover,.stop.active{background:rgba(91,155,196,.16)}
  .stop.active{box-shadow:inset 3px 0 0 var(--glacier)}
  .stop:focus-visible,.stopcard:focus-visible,.iday-head:focus-visible{outline:2px solid var(--glacier);outline-offset:-2px}
  .stop .dot{flex:none;width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;background:var(--glacier);margin-top:1px}
  .stop.base .dot{border-radius:6px}
  .stop .txt{display:block}
  .stop .txt .nm{display:block;font-size:14.5px;font-weight:600;line-height:1.25}
  .stop .txt .ds{display:block;margin-top:1px;font-size:12.5px;color:var(--muted);line-height:1.3}
  .back{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--amber-deep);padding:6px 10px;cursor:pointer}
  .back:hover{text-decoration:underline}
  /* itinerary accordion */
  .itin-tools{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .itin-allbtns{white-space:nowrap}
  .linkbtn{font-size:12px;font-weight:600;color:var(--amber-deep);text-decoration:underline;padding:5px 2px}
  .linkbtn:hover{color:var(--navy2)}
  .dot-sep{color:var(--muted);margin:0 5px}
  .iday{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff;overflow:hidden;box-shadow:0 2px 8px rgba(11,34,57,.05)}
  .iday.active{box-shadow:inset 4px 0 0 var(--dc),0 3px 12px rgba(11,34,57,.10)}
  .iday-head{display:flex;align-items:center;flex-wrap:wrap;gap:8px 10px;padding:12px 14px;cursor:pointer;user-select:none}
  .iday-head:hover{background:var(--paper)}
  .caret{flex:none;width:12px;color:var(--muted);font-size:11px}
  .caret::before{content:"▾"}
  .iday.collapsed .caret::before{content:"▸"}
  .iday-num{flex:none;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px}
  .iday-htext{flex:1 1 150px;min-width:0}
  .iday-title{display:block;font-family:'Fraunces',serif;font-size:16px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iday-sub{display:block;font-size:11.5px;color:var(--muted);line-height:1.3;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iday-sleep{flex:none;font-size:10px;letter-spacing:.4px;text-transform:uppercase;color:var(--amber-deep);font-weight:700;border:1px solid var(--amber);border-radius:5px;padding:2px 6px;white-space:nowrap}
  .iday-details{flex:none;font-size:11.5px;font-weight:600;color:var(--amber-deep);white-space:nowrap;padding:6px 4px;margin:-6px -2px}
  .iday-details:hover{text-decoration:underline}
  .iday-body{padding:0 8px 8px}
  .iday.collapsed .iday-body{display:none}
  /* itinerary detail page */
  .day-page-head{padding:4px 4px 14px 12px;margin-bottom:10px;border-bottom:1px solid var(--line);border-left:4px solid var(--dc)}
  .day-stops{display:flex;flex-direction:column;gap:10px}
  .stopcard{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(11,34,57,.05);transition:background .12s,box-shadow .12s}
  .stopcard:hover{background:var(--paper)}
  .stopcard.active{box-shadow:inset 4px 0 0 var(--glacier),0 3px 12px rgba(11,34,57,.1)}
  .stopcard .dot{flex:none;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;margin-top:1px}
  .stopcard.base .dot{border-radius:7px}
  .stopcard-txt{min-width:0}
  .stopcard-txt .nm{font-family:'Fraunces',serif;font-size:16px;font-weight:600;line-height:1.2}
  .stopcard-txt .ds{font-size:13px;color:var(--muted);margin:2px 0 6px;line-height:1.35}
  .stopcard-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .stopcard-meta .tag{font-size:10px;letter-spacing:.4px;text-transform:uppercase;font-weight:700;color:var(--navy2);background:var(--paper2);border-radius:5px;padding:2px 7px}
  .stopcard-meta a{font-size:12px;font-weight:600;color:var(--amber-deep);text-decoration:none;padding:4px 0}
  .stopcard-meta a:hover{text-decoration:underline}

  /* ---------- CARDS / LISTS (bases, lodging, drives, budget) ---------- */
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:13px;box-shadow:0 2px 8px rgba(11,34,57,.05)}
  .card h4{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:2px}
  .card .nights{font-size:11px;color:var(--amber-deep);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:9px}
  .card ul{list-style:none}
  .card li{font-size:13px;padding-left:16px;position:relative;margin-bottom:5px;line-height:1.4}
  .card li::before{content:"";position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;background:var(--glacier)}
  .card li.star::before{content:"★";color:var(--amber);background:none;width:auto;height:auto;border-radius:0;top:3px;font-size:11px;line-height:1}
  .card li .nm{font-weight:600}
  .card li .ds{color:var(--muted)}
  .cardgrid{display:flex;flex-direction:column;gap:13px}
  .cardgrid > .card,.cardgrid > .leg{margin-bottom:0}
  .leg{margin-bottom:16px}
  .leg h4{font-family:'Fraunces',serif;font-size:16px;color:var(--navy2);margin-bottom:2px}
  .leg .legnote{font-size:12.5px;color:var(--muted);font-style:italic;margin-bottom:6px}
  .pick{font-size:13px;margin-bottom:8px;padding-left:16px;position:relative;line-height:1.4}
  .pick::before{content:"";position:absolute;left:0;top:7px;width:7px;height:7px;border-radius:50%;background:var(--glacier)}
  .pick.top::before{content:"★";color:var(--amber);background:none;width:auto;height:auto;border-radius:0;top:3px;font-size:11px;line-height:1}
  .pick .nm{font-weight:600}
  .pick .rt{color:var(--amber-deep);font-weight:600;font-size:11.5px}
  .pick .ds{color:var(--muted)}
  .pick a{font-size:11.5px;font-weight:600;color:var(--amber-deep);text-decoration:none}
  .pick a:hover{text-decoration:underline}
  .pick .nm a{color:var(--navy2);text-decoration:none}
  .pick .nm a:hover{text-decoration:underline}
  .morelinks{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:10px}
  .morelbl{font-size:11.5px;color:var(--muted);font-weight:600;margin-right:1px}
  .morelinks a{font-size:11.5px;font-weight:600;text-decoration:none;color:var(--navy2);background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px 9px}
  .morelinks a:hover{background:var(--paper2)}
  .note{background:#fff7e8;border:1px solid var(--amber);border-radius:10px;padding:12px 14px;font-size:13px;color:#7a4f00;margin-bottom:14px}
  .note b{color:#5e3a00}
  .tbl{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 12px rgba(11,34,57,.05)}
  .tbl th{background:var(--navy);color:#fff;text-align:left;padding:10px 12px;font-weight:600;font-size:12px}
  .tbl td{padding:9px 12px;border-top:1px solid var(--line)}
  .tbl tr:nth-child(even) td{background:var(--paper)}
  .tbl tr.total td{background:var(--ice);font-weight:600}

  /* ---------- CHECKLIST (interactive, localStorage) ---------- */
  .check{list-style:none}
  .check li{font-size:13.5px;padding:9px 8px 9px 30px;position:relative;border-bottom:1px solid var(--line);line-height:1.4;cursor:pointer;border-radius:6px;transition:background .12s}
  .check li::before{content:"☐";position:absolute;left:6px;top:8px;font-size:16px;color:var(--glacier)}
  .check li.done::before{content:"✓";color:#2e8b6f;font-weight:700}
  .check li.done{color:var(--muted)}
  .check li.done .nm{text-decoration:line-through}
  .check li:hover{background:rgba(91,155,196,.12)}
  .check li:focus-visible{outline:2px solid var(--glacier);outline-offset:1px}
  .check .nm{font-weight:600}
  .check-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
  #checkProgress{font-size:13px;font-weight:700;color:var(--navy2)}
  .reset{font-size:11.5px;color:var(--muted);text-decoration:underline}
  .reset:hover{color:var(--amber-deep)}
  .check-hint{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .progress{height:7px;border-radius:5px;background:var(--paper2);overflow:hidden;margin-bottom:11px}
  .progress > i{display:block;height:100%;width:0;background:#2e8b6f;transition:width .35s ease}
  /* weather & packing */
  .wx{background:#fff;border:1px solid var(--line);border-radius:12px;padding:4px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(11,34,57,.05)}
  .wx-row{display:flex;gap:12px;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px}
  .wx-row:first-child{border-top:none}
  .wx-k{flex:none;width:78px;font-weight:700;color:var(--navy2)}
  .wx-v{color:var(--muted)}
  .pack-cat{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber-deep);font-weight:700;margin:16px 0 4px}
  .pack-list{margin-bottom:2px}
  .skip-list{list-style:none;margin-top:2px}
  .skip-list li{font-size:13px;color:var(--muted);padding:5px 0 5px 22px;position:relative;line-height:1.4}
  .skip-list li::before{content:"✕";position:absolute;left:4px;top:5px;color:#b5503c;font-weight:700;font-size:12px}

  /* ---------- RIGHT: MAP COLUMN ---------- */
  #mapcol{position:relative;display:flex;flex-direction:column;min-width:0}
  @media(max-width:860px){ #mapcol{order:1;height:48vh;flex:none} }
  .chipbar{flex:none;display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--paper);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
  .chipbar::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;background:#fff;color:var(--navy2);border:1px solid var(--line)}
  .chip:hover{background:var(--paper2)}
  .chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .chip.all.active{background:var(--amber-deep);border-color:var(--amber-deep)}
  .chip.all{position:sticky;left:0;z-index:2;box-shadow:7px 0 0 var(--paper)}
  #map{flex:1;min-height:0;background:#aac4d6}

  .maplibregl-popup-content{font-family:'Spline Sans',sans-serif;border-radius:12px;padding:0;box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden}
  .maplibregl-popup-close-button{font-size:18px;color:var(--muted);padding:2px 7px}
  .pop{padding:12px 14px 13px;max-width:240px}
  .pop b{font-family:'Fraunces',serif;font-size:15px;display:block;margin-bottom:3px;color:var(--navy)}
  .pop p{font-size:13px;color:var(--muted);margin-bottom:8px}
  .pop a{font-size:12.5px;font-weight:600;text-decoration:none;color:var(--amber-deep)}
  .pop a:hover{text-decoration:underline}

  .pin{--c:#3a6ea5;width:28px;height:28px;display:flex;align-items:center;justify-content:center;
    background:var(--c);color:#fff;border:2.5px solid #fff;border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);box-shadow:0 3px 8px rgba(11,34,57,.4);font-size:12.5px;font-weight:700;cursor:pointer;transition:transform .15s, filter .15s, opacity .2s}
  .pin.dim{opacity:.38}
  .pin.dim:hover{opacity:.9}
  .pin span{transform:rotate(45deg);line-height:1}
  .pin.pin-base{--c:var(--amber);width:32px;height:32px;font-size:15px;z-index:5}
  .pin.pin-star{box-shadow:0 0 0 2px var(--amber),0 3px 8px rgba(11,34,57,.45)}
  .pin:hover,.pin.pin-hi{filter:brightness(1.08);transform:rotate(-45deg) scale(1.18);z-index:20}
  .pin.pinpulse{animation:pulse .6s ease}
  @keyframes pulse{0%{transform:rotate(-45deg) scale(1)}40%{transform:rotate(-45deg) scale(1.4)}100%{transform:rotate(-45deg) scale(1.18)}}

  .leglabel{background:rgba(255,255,255,.93);border:1px solid var(--line);border-radius:999px;padding:2px 7px;font-size:10.5px;font-weight:600;color:var(--navy2);white-space:nowrap;box-shadow:0 1px 4px rgba(11,34,57,.25);pointer-events:none}
  #maperror{display:none;position:absolute;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;background:var(--paper);text-align:center;padding:30px}
  #maperror h3{font-family:'Fraunces',serif;font-size:22px;margin-bottom:8px}
  #maperror p{color:var(--muted);font-size:14px;max-width:360px}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <span class="brand">🇮🇸 Iceland '26</span>
    <span class="subtitle">Andy &amp; Alex · Southern Loop + Snæfellsnes · Jul 29 – Aug 6, 2026</span>
  </header>
  <div id="main">
    <div id="panel">
      <div class="tabbar" id="tabbar"></div>
      <div id="tabcontent">
        <div class="tabpane" id="tab-itinerary"></div>
        <div class="tabpane" id="tab-bases" hidden></div>
        <div class="tabpane" id="tab-lodging" hidden></div>
        <div class="tabpane" id="tab-drives" hidden></div>
        <div class="tabpane" id="tab-budget" hidden></div>
        <div class="tabpane" id="tab-checklist" hidden></div>
        <div class="tabpane" id="tab-pack" hidden></div>
      </div>
    </div>
    <div id="divider" title="Drag to resize · double-click to reset"></div>
    <div id="mapcol">
      <div class="chipbar"><div style="display:flex;gap:7px" id="chips"></div></div>
      <div id="map"></div>
      <div id="maperror">
        <h3>🗺 Map needs a connection</h3>
        <p>The interactive map loads tiles from the internet. Reconnect and refresh — all trip info still works in the panel.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  TRIP DATA — single source of truth.
//  Edit values here and the whole page (map, routes, pins,
//  itinerary, and every Trip-info tab) re-renders automatically.
//
//  SCHEMA (see README.md for the full guide):
//    days[]   : { id, label, date, title, drive, sleep, stops[] }
//      stops[]: { name, type:'base'|'sight', star:bool, lat, lng, desc }
//    bases[]  : { title, nights, items:[ [name, star, desc] ] }
//    legs[]   : { title, note, stops:[ [name, desc, lat, lng] ] }
//    lodging[]: { region, picks:[ [name, rating, price, desc, top] ] }
//    budget[] : [ item, estimate, note ]    + budgetTotal:[ ... ]
//    checklist: [ [text, done] ]
//    To get coordinates: right-click a spot in Google Maps → click the lat/lng.
// ============================================================
const TRIP = {
  days: [
    { id:1, label:"Day 1", date:"Thu Jul 30", title:"Arrival + Reykjavik", drive:"KEF → Reykjavik · ~45 km (30 min)", sleep:"Reykjavik",
      stops:[

const $=id=>document.getElementById(id);
const key=(d,s)=>d+'-'+s;
const esc=t=>String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// localStorage-backed checklist — persists per browser/device, keyed by item text
const LS_KEY='iceland26-checklist-v1';
function getChecks(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }
function saveChecks(o){ try{ localStorage.setItem(LS_KEY,JSON.stringify(o)); }catch(e){} }
function isDone(text,def){ const c=getChecks(); return c[text]!==undefined?c[text]:def; }

// ============ MAP ============
// Custom control: re-fit the map to the current selection (full route or selected day)
class RecenterControl {
  onAdd(m){
    this._map=m;
    const d=document.createElement('div');
    d.className='maplibregl-ctrl maplibregl-ctrl-group';
    const b=document.createElement('button');
    b.type='button'; b.title='Recenter on the route'; b.setAttribute('aria-label','Recenter on the route');
    b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0b2239" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M4 8 V4 H8"/><path d="M16 4 H20 V8"/><path d="M20 16 V20 H16"/><path d="M8 20 H4 V16"/></svg>';
    b.onclick=()=>{ if(openPopup){ openPopup.remove(); openPopup=null; } fitTo(selected,false); };
    d.appendChild(b); this._el=d; return d;
  }
  onRemove(){ if(this._el&&this._el.parentNode) this._el.parentNode.removeChild(this._el); this._map=undefined; }
}
function initMap(){
  if(typeof maplibregl==='undefined'){ $('maperror').style.display='flex'; return; }
  try{
    map=new maplibregl.Map({
      container:'map',
      style:'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
      center:[-18.9,64.85], zoom:5.2, minZoom:4, attributionControl:{compact:true},
      dragRotate:false, renderWorldCopies:false
    });
  }catch(e){ $('maperror').style.display='flex'; return; }
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-right');
  map.addControl(new maplibregl.FullscreenControl(),'bottom-right');
  map.addControl(new RecenterControl(),'bottom-right');
  map.on('load',()=>{
    mapReady=true;
    $('maperror').style.display='none';
    addRoutes();
    addMarkers();
    addLegLabels();
    applyView('all',true);
  });
  map.on('error',()=>{}); // swallow transient tile errors so they don't spam the console
  map.on('click',()=>{ if(openPopup){ openPopup.remove(); openPopup=null; } clearActiveRow(); });
  // if the style/tiles never load (offline, CDN down), reveal the fallback message
  setTimeout(()=>{ if(!mapReady) $('maperror').style.display='flex'; }, 8000);
}

function addRoutes(){
  TRIP.days.forEach((d,i)=>{
    const coords=d.stops.map(s=>[s.lng,s.lat]);
    map.addSource('route-'+i,{type:'geojson',data:{type:'Feature',properties:{},geometry:{type:'LineString',coordinates:coords}}});
    map.addLayer({id:'route-'+i,type:'line',source:'route-'+i,
      layout:{'line-join':'round','line-cap':'round','visibility':'none'},
      paint:{'line-color':dayColors[i],'line-width':4,'line-opacity':.85}});
  });
}
function addMarkers(){
  TRIP.days.forEach((d,i)=>{
    d.stops.forEach((s,j)=>{
      const el=document.createElement('div');
      el.className='pin'+(s.type==='base'?' pin-base':'')+(s.star?' pin-star':'');
      if(s.type!=='base') el.style.setProperty('--c',dayColors[i]); // bases stay amber (see .pin-base)
      el.innerHTML='<span>'+(s.type==='base'?'🛏':(j+1))+'</span>';
      el.title=s.name;
      const popup=new maplibregl.Popup({offset:18,closeButton:true,maxWidth:'260px'})
        .setHTML('<div class="pop"><b>'+esc(s.name)+'</b><p>'+esc(s.desc)+'</p>'+
                 '<a href="'+gmaps(s.lat,s.lng)+'" target="_blank" rel="noopener">Open in Google Maps ↗</a></div>');
      const marker=new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([s.lng,s.lat]).addTo(map);
      el.addEventListener('click',ev=>{ ev.stopPropagation(); focusStop(i,j); });
      reg[key(i,j)]={marker,el,popup,lng:s.lng,lat:s.lat};
    });
  });
}
// straight-line km between two [lng,lat] points
function haversine(a,b){
  const R=6371, rad=x=>x*Math.PI/180;
  const dLat=rad(b[1]-a[1]), dLng=rad(b[0]-a[0]);
  const h=Math.sin(dLat/2)**2 + Math.cos(rad(a[1]))*Math.cos(rad(b[1]))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
// rough per-leg distance + time pills, placed at each segment midpoint
function addLegLabels(){
  TRIP.days.forEach((d,i)=>{
    const arr=[];
    for(let j=0;j<d.stops.length-1;j++){
      const a=d.stops[j], b=d.stops[j+1];
      const km=haversine([a.lng,a.lat],[b.lng,b.lat])*1.3;   // ~road windiness factor
      if(km<2) continue;
      const min=Math.max(5, Math.round(km/80*60/5)*5);        // ~80 km/h average
      const kmR=km<30?Math.round(km/5)*5:Math.round(km/10)*10;
      const el=document.createElement('div');
      el.className='leglabel'; el.style.display='none';
      el.textContent='~'+kmR+' km · '+min+' min';
      const mk=new maplibregl.Marker({element:el,anchor:'center'})
        .setLngLat([(a.lng+b.lng)/2,(a.lat+b.lat)/2]).addTo(map);
      arr.push(mk);
    }
    legLabels[i]=arr;
  });
}
function visibleFor(sel){
  document.querySelectorAll('.pin.pin-hi').forEach(el=>el.classList.remove('pin-hi')); // clear stale hover highlights
  TRIP.days.forEach((d,i)=>{
    const active=(sel==='all'||sel===i);
    // keep every day on the map; just emphasize the selected one and fade the rest
    if(map.getLayer('route-'+i)){
      map.setLayoutProperty('route-'+i,'visibility','visible');
      map.setPaintProperty('route-'+i,'line-opacity',active?0.9:0.16);
      map.setPaintProperty('route-'+i,'line-width',active?4:2.5);
    }
    d.stops.forEach((s,j)=>{ const r=reg[key(i,j)]; if(r){ r.el.style.display='flex'; r.el.classList.toggle('dim',!active); } });
    // leg distance/time pills: only for the focused day (avoid clutter in the full-route view)
    const showLegs=(sel!=='all' && sel===i);
    if(legLabels[i]) legLabels[i].forEach(mk=>{ mk.getElement().style.display=showLegs?'block':'none'; });
  });
}
function boundsFor(sel){
  const b=new maplibregl.LngLatBounds();
  TRIP.days.forEach((d,i)=>{ if(sel==='all'||sel===i) d.stops.forEach(s=>b.extend([s.lng,s.lat])); });
  return b;
}
function fitTo(sel,instant){
  const b=boundsFor(sel); if(b.isEmpty()) return;
  const pad=isMobile()?{top:34,bottom:34,left:26,right:26}:{top:54,bottom:54,left:54,right:54};
  map.fitBounds(b,{padding:pad,duration:instant?0:850,maxZoom:sel==='all'?8.3:11});
}
function applyView(sel,instant){
  if(mapReady){ visibleFor(sel); if(openPopup){openPopup.remove();openPopup=null;} fitTo(sel,instant); }
}

// ============ SELECTION / TWO-WAY SYNC ============
function selectDay(sel){
  if(sel==='all'){
    dayPage=null; selected='all';
    renderItinerary();
    if(mapReady){ visibleFor('all'); if(openPopup){openPopup.remove();openPopup=null;} fitTo('all',false); }
    renderChips();
    return;
  }
  if(dayPage!==null){ openDayPage(sel); return; }   // browsing detail pages: stay in detail
  expanded[sel]=true;
  const sec=document.querySelector('.iday[data-day="'+sel+'"]');
  if(sec) sec.classList.remove('collapsed');
  focusDay(sel);
  if(sec) sec.scrollIntoView({block:'start',behavior:'smooth'});
}
function focusDay(i){
  selected=i;
  if(mapReady){ visibleFor(i); if(openPopup){openPopup.remove();openPopup=null;} fitTo(i,false); }
  renderChips(); markActive(i);
}
function toggleDay(i){
  const sec=document.querySelector('.iday[data-day="'+i+'"]'); if(!sec) return;
  expanded[i]=!expanded[i];
  sec.classList.toggle('collapsed',!expanded[i]);
  if(expanded[i]) focusDay(i);   // opening a day focuses it on the map
}
function expandAll(flag){
  expanded=TRIP.days.map(()=>!!flag);
  document.querySelectorAll('.iday').forEach(s=>s.classList.toggle('collapsed',!flag));
}
function markActive(sel){
  document.querySelectorAll('.iday').forEach(s=>s.classList.toggle('active', sel!=='all' && (+s.dataset.day)===sel));
}
function openDayPage(i, skipFit){
  if(i<0||i>=TRIP.days.length) return;
  dayPage=i; selected=i;
  if(activeTab!=='itinerary') setTab('itinerary');
  renderItinerary();
  if(mapReady){ visibleFor(i); if(openPopup){openPopup.remove();openPopup=null;} if(!skipFit) fitTo(i,false); }
  renderChips();
  if(!skipFit) $('tabcontent').scrollTop=0;
}
function focusStop(d,s){
  if(activeTab!=='itinerary') setTab('itinerary');
  if(dayPage!==null){
    if(dayPage!==d) openDayPage(d,true);            // navigate detail page to the clicked day
  } else {
    expanded[d]=true;
    const sec=document.querySelector('.iday[data-day="'+d+'"]'); if(sec) sec.classList.remove('collapsed');
    markActive(d);
  }
  selected=d;
  if(mapReady) visibleFor(d);
  renderChips();
  setActiveRow(d,s);   // panel highlight works even before/without the map
  const r=reg[key(d,s)];
  if(r && mapReady){
    if(openPopup) openPopup.remove();
    r.popup.setLngLat([r.lng,r.lat]).addTo(map); openPopup=r.popup;
    map.flyTo({center:[r.lng,r.lat],zoom:Math.max(map.getZoom(),9.3),speed:.85,curve:1.4});
    r.el.classList.remove('pinpulse'); void r.el.offsetWidth; r.el.classList.add('pinpulse');
  }
  if(isMobile()){ const mc=$('mapcol'); if(mc) mc.scrollIntoView({behavior:'smooth',block:'start'}); }
}
function hiMarker(d,s,on){ const r=reg[key(d,s)]; if(r) r.el.classList.toggle('pin-hi',on); }
function setActiveRow(d,s){
  clearActiveRow();
  const row=document.querySelector('[data-k="'+d+'-'+s+'"]');
  if(row){ row.classList.add('active'); row.scrollIntoView({block:'nearest',behavior:'smooth'}); }

// ---- draggable divider: resize the trip panel vs. the map (desktop) ----
(function(){
  const divider=$('divider'), main=$('main');
  if(!divider||!main) return;
  const MINW=300, RESERVE=360, LS='iceland26-panel-w-v2';   // keep >=300px panel and >=360px map; v2 = 50/50 default
  let curW=null, raf=0, dragging=false;
  const maxW=()=>Math.max(MINW, window.innerWidth - RESERVE);
  function setW(px){ const w=Math.min(maxW(), Math.max(MINW, px)); curW=w; main.style.setProperty('--panel-w', w+'px'); }
  try{ const s=parseFloat(localStorage.getItem(LS)); if(s) setW(s); }catch(e){}
  const posX=e=>(e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX;
  function onMove(e){
    if(!dragging) return;
    setW(posX(e)-main.getBoundingClientRect().left);
    if(!raf) raf=requestAnimationFrame(()=>{ raf=0; if(mapReady) map.resize(); });
    e.preventDefault();
  }
  function start(e){ if(isMobile()) return; dragging=true; divider.classList.add('dragging'); document.body.style.userSelect='none'; document.body.style.cursor='col-resize'; e.preventDefault(); }
  function stop(){ if(!dragging) return; dragging=false; divider.classList.remove('dragging'); document.body.style.userSelect=''; document.body.style.cursor=''; if(mapReady) map.resize(); try{ if(curW) localStorage.setItem(LS, Math.round(curW)); }catch(e){} }
  divider.addEventListener('mousedown',start);
  divider.addEventListener('touchstart',start,{passive:false});
  window.addEventListener('mousemove',onMove);
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('mouseup',stop);
  window.addEventListener('touchend',stop);
  window.addEventListener('resize',()=>{ if(curW!=null) setW(curW); });
  divider.addEventListener('dblclick',()=>{ try{ localStorage.removeItem(LS); }catch(e){} curW=null; main.style.removeProperty('--panel-w'); if(mapReady) map.resize(); });
})();

renderTabs();
renderItinerary();
renderBases();
renderLodging();
renderDrives();
renderBudget();
renderChecklist();
renderPacking();
renderChips();
initMap();
</script>
</body>
